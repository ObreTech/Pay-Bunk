<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
</head>
<body style="font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px;">

    <div style="background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 380px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h1>🚀 PAY BUNK</h1>
        <p style="color: #94a3b8;">Inversión libre en USDT</p>
        
        <div id="ton-connect-button" style="display: flex; justify-content: center; margin-bottom: 25px; min-height: 44px;"></div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #38bdf8;">Monto a invertir (USDT):</label>
            <input type="number" id="montoInput" placeholder="Ej: 1000" style="width: 80%; padding: 12px; border-radius: 10px; border: none; font-size: 18px; text-align: center; outline: none;">
        </div>

        <button onclick="procesarInversion()" style="background-color: #0088cc; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 18px; transition: 0.3s;">
            INVERTIR AHORA
        </button>
    </div>

    <script>
        // Inicialización ultra-segura
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function procesarInversion() {
            const monto = document.getElementById('montoInput').value;

            if (!monto || monto <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            // Si no está conectado, forzamos que se abra el panel de conexión
            if (!tonConnectUI.connected) {
                alert("Primero conecta tu billetera.");
                await tonConnectUI.openModal();
                return;
            }

            const contratoUSDT = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";
            const payload = "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA";

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: contratoUSDT,
                    amount: "100000000", // 0.1 TON para gas
                    payload: payload
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("¡Solicitud enviada! Confirma la inversión de " + monto + " USDT en tu billetera.");
            } catch (e) {
                console.error(e);
                // Si el sistema automático falla, usamos el enlace directo como último recurso
                window.location.href = ton://transfer/${contratoUSDT}?amount=100000000&bin=${payload};
            }
        }
    </script>
</body>
</html>
