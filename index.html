<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk - USDT Gateway</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 20px; border-radius: 15px; background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 8px; background: #0088cc; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00aaff; }
        button.large { grid-column: span 2; background: #2ecc71; }
        #ton-connect-button { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pay Bunk</h2>
        <div id="ton-connect-button"></div>

        <p>Selecciona el monto en <b>USDT</b>:</p>
        
        <div class="btn-group">
            <button onclick="sendUSDT(10)">10 USDT</button>
            <button onclick="sendUSDT(50)">50 USDT</button>
            <button onclick="sendUSDT(100)">100 USDT</button>
            <button onclick="sendUSDT(1000)">1000 USDT</button>
            <button class="large" onclick="sendUSDT(3000)">3000 USDT</button>
        </div>
    </div>

    <script>
        // 1. Inicializar TonConnect UI
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://tusitio.com/tonconnect-manifest.json', // CAMBIA ESTO POR TU URL REAL
            buttonRootId: 'ton-connect-button'
        });

        // 2. Función para procesar el pago de USDT
        async function sendUSDT(amount) {
            const walletConnection = tonConnectUI.account;

            if (!walletConnection) {
                alert("Por favor, conecta tu billetera primero usando el botón superior.");
                return;
            }

            // Configuración del contrato USDT en TON Mainnet
            const USDT_CONTRACT = "EQCxE6mXvWXD_3kTQs0X9Mbt7356o5kZzEAr_9o1qTmf98t6"; 
            const DESTINATION_WALLET = "TU_DIRECCION_DE_BILLETERA_AQUI"; // <--- PON TU BILLETERA AQUÍ
            
            // Los montos en TON se manejan con decimales. USDT tiene 6 decimales.
            const nanoAmount = (amount * 1000000).toString();

            // Construcción del Payload (Transferencia de Jetton estándar)
            // Se requiere un poco de TON (aprox 0.05) para pagar el gas de la red
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300, // 5 minutos de validez
                messages: [
                    {
                        address: USDT_CONTRACT,
                        amount: "50000000", // 0.05 TON para el gas
                        payload: "te6cckEBAQEANAAAs78BAf9A8AABX6u+fQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM68BAf9A8AABX6u+fQ==" 
                        // NOTA: El payload anterior es un placeholder simplificado. 
                        // En producción, el payload debe ser generado por una librería como tonweb 
                        // para incluir la dirección de destino específica.
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                alert("Transacción enviada con éxito: " + amount + " USDT");
            } catch (e) {
                console.error(e);
                alert("Error o transacción cancelada por el usuario.");
            }
        }
    </script>
</body>
</html>
