<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Web3</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonweb/0.0.66/tonweb.bundle.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 30px; border-radius: 20px; background: #1e1e1e; border: 1px solid #333; width: 90%; max-width: 400px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { padding: 15px; border: none; border-radius: 10px; background: #0088cc; color: white; font-weight: bold; cursor: pointer; }
        button.large { grid-column: span 2; background: #2ecc71; }
        #ton-connect-button { margin-bottom: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pay Bunk</h1>
        <div id="ton-connect-button"></div>
        <div class="btn-group">
            <button onclick="sendUSDT(10)">Invertir 10 USDT</button>
            <button onclick="sendUSDT(50)">Invertir 50 USDT</button>
            <button onclick="sendUSDT(100)">Invertir 100 USDT</button>
            <button onclick="sendUSDT(1000)">Invertir 1000 USDT</button>
            <button class="large" onclick="sendUSDT(3000)">Invertir 3000 USDT</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://pay-bunk.vercel.app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function sendUSDT(amount) {
            if (!tonConnectUI.connected) {
                tonConnectUI.openModal();
                return;
            }

            const DESTINO = "UQCT67yhgE0nbSjW-yTIcOp-KJtcT7h1ebc1Sr0EK7Tn8Vic";
            const USDT_CONTRACT = "EQCxE6mXvWXD_3kTQs0X9Mbt7356o5kZzEAr_9o1qTmf98t6";

            try {
                // 1. Usamos TonWeb para crear el mensaje de transferencia real
                const tonweb = new TonWeb();
                const jettonWallet = new TonWeb.token.jetton.JettonWallet(tonweb.provider, {
                    address: USDT_CONTRACT
                });

                // Convertimos el monto (10 USDT = 10,000,000 units)
                const jettonAmount = TonWeb.utils.toNano(amount.toString()).div(new TonWeb.utils.BN(1000));

                // 2. Creamos el Payload (Cuerpo del mensaje) de forma dinámica
                const comment = new Uint8Array(0); // Sin comentario para evitar errores
                const cell = new TonWeb.boc.Cell();
                cell.bits.writeUint(0xf8a7ea5, 32); // op transfer
                cell.bits.writeUint(0, 64); // query id
                cell.bits.writeCoins(jettonAmount); // amount en units de USDT
                cell.bits.writeAddress(new TonWeb.utils.Address(DESTINO)); // destino
                cell.bits.writeAddress(new TonWeb.utils.Address(DESTINO)); // response address
                cell.bits.writeBit(false); // no custom payload
                cell.bits.writeCoins(TonWeb.utils.toNano('0.01')); // forward amount
                cell.bits.writeBit(false); // no forward payload

                const payloadBase64 = TonWeb.utils.bytesToBase64(await cell.toBoc());

                // 3. Enviamos la transacción
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [
                        {
                            address: USDT_CONTRACT,
                            amount: "100000000", // 0.1 TON para gas
                            payload: payloadBase64
                        }
                    ]
                };

                await tonConnectUI.sendTransaction(transaction);
                alert("¡Transacción enviada! Confirma en Tonkeeper.");

            } catch (e) {
                console.error(e);
                alert("Error técnico: " + e.message);
            }
        }
    </script>
</body>
</html>
