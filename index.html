<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body style="font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px;">

    <div style="background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155;">
        <h1>🚀 PAY BUNK</h1>
        <p>Inversión en USDT (Red TON)</p>
        <div id="ton-connect-button" style="display: flex; justify-content: center; margin: 25px 0;"></div>
        
        <button class="btn" onclick="invertir(10)">Invertir 10 USDT</button>
        <button class="btn" onclick="invertir(50)">Invertir 50 USDT</button>
        <button class="btn" onclick="invertir(100)">Invertir 100 USDT</button>
        <button class="btn" onclick="invertir(1000)">Invertir 1000 USDT</button>
        <button class="btn" onclick="invertir(3000)">Invertir 3000 USDT</button>
    </div>

    <style>
        .btn { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn:hover { background-color: #00aaff; }
    </style>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function invertir(monto) {
            if (!tonConnectUI.connected) {
                alert("Conecta tu billetera primero.");
                return;
            }

            try {
                // 1. Tu billetera personal (donde recibes)
                const destino = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";
                
                // 2. Dirección del Contrato Maestro de USDT en TON
                const USDT_MASTER = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6"; 

                // 3. Cálculo del monto en unidades USDT (6 decimales)
                const amountInUnits = (monto * 1000000).toString();

                // 4. Construcción de la transacción según el Asset SDK
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 360,
                    messages: [
                        {
                            address: USDT_MASTER, // Enviamos la instrucción al contrato de USDT
                            amount: "100000000", // 0.1 TON para gas
                            // Este payload es la instrucción estándar de transferencia de Jetton
                            payload: "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA" 
                        }
                    ]
                };

                await tonConnectUI.sendTransaction(transaction);
                alert("¡Transacción enviada! Esperando confirmación de la red.");

            } catch (e) {
                console.error(e);
                alert("Error: Revisa que tengas TON para el gas y que la billetera esté vinculada correctamente.");
            }
        }
    </script>
</body>
</html>
