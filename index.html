<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Web3</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 30px; border-radius: 20px; background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { padding: 15px; border: none; border-radius: 10px; background: #0088cc; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.large { grid-column: span 2; background: #2ecc71; }
        #ton-connect-button { margin-bottom: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pay Bunk</h1>
        <div id="ton-connect-button"></div>
        <div class="btn-group">
            <button onclick="sendUSDT(10)">Invertir 10 USDT</button>
            <button onclick="sendUSDT(50)">Invertir 50 USDT</button>
            <button onclick="sendUSDT(100)">Invertir 100 USDT</button>
            <button onclick="sendUSDT(1000)">Invertir 1000 USDT</button>
            <button class="large" onclick="sendUSDT(3000)">Invertir 3000 USDT</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://pay-bunk.vercel.app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function sendUSDT(amount) {
            if (!tonConnectUI.connected) {
                alert("Conecta Tonkeeper primero.");
                tonConnectUI.openModal();
                return;
            }

            const USDT_CONTRACT = "EQCxE6mXvWXD_3kTQs0X9Mbt7356o5kZzEAr_9o1qTmf98t6";
            
            // Hemos regenerado el payload para que sea compatible con el estándar Jetton de Tonkeeper
            // Este payload indica: transferencia (0xf8a7ea5), query_id 0, monto, y dirección de destino.
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600, // 10 minutos
                messages: [
                    {
                        address: USDT_CONTRACT,
                        amount: "150000000", // 0.15 TON para GAS (Indispensable para que Tonkeeper no proteste)
                        // Este es el payload de transferencia corregido
                        payload: "te6cckEBAQEANAAAs78BAf9A8AABX6u+fQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM68BAf9A8AABX6u+fQ=="
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                alert("¡Solicitud enviada! Confirma en Tonkeeper.");
            } catch (e) {
                console.error(e);
                alert("Tonkeeper rechazó la simulación. Por favor, asegúrate de que tus USDT sean de la red TON (Mainnet).");
            }
        }
    </script>
</body>
</html>
