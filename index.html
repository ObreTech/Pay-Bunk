<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk - Inversión</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-3000 { grid-column: span 2; background: #22c55e; }
        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Pay Bunk</h1>
        <div id="ton-connect-button"></div>
        <div class="grid">
            <button onclick="sendPAY(10)">10 USDT</button>
            <button onclick="sendPAY(50)">50 USDT</button>
            <button onclick="sendPAY(100)">100 USDT</button>
            <button onclick="sendPAY(1000)">1000 USDT</button>
            <button class="btn-3000" onclick="sendPAY(3000)">Invertir 3000 USDT</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://pay-bunk.vercel.app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        function sendPAY(amount) {
            if (!tonConnectUI.connected) {
                tonConnectUI.openModal();
                return;
            }

            // DATOS DE TUS CONTRATOS
            const PAY_JETTON_WALLET = "EQBXnmpMN8VJqdILjioOZtAqE-AmB9ugHbyNDzd9UmJ1toKZ";
            const SMART_CONTRACT_RECIBIDOR = "EQCcmm_Oh7Gl8Xd7WuJ-8k-Dp-zYLV3ahTS2RAQo3uT8kCLB";

            // Cálculo para 6 decimales (estándar de USDT/Jettons en DeDust)
            const unidades = amount * 1000000;

            // Este es el enlace "Deep Link" que Tonkeeper entiende como una orden de DeDust
            // Es la vía más rápida y sin errores de código.
            const link = https://app.tonkeeper.com/transfer/${SMART_CONTRACT_RECIBIDOR}?token=${PAY_JETTON_WALLET}&amount=${unidades};
            
            window.location.href = link;
        }
    </script>
</body>
</html>
