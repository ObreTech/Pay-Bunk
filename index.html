<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 26px; margin-bottom: 5px; }
        #ton-connect-button { display: flex; justify-content: center; margin: 25px 0; min-height: 44px; }
        .contenedor-pagos { display: flex; flex-direction: column; gap: 12px; }
        .btn-usdt { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-usdt:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 PAY BUNK</h1>
        <p style="color: #94a3b8;">Inversión en USDT</p>
        
        <div id="ton-connect-button"></div>

        <div class="contenedor-pagos">
            <button class="btn-usdt" onclick="ejecutarPago(10)">Invertir 10 USDT</button>
            <button class="btn-usdt" onclick="ejecutarPago(50)">Invertir 50 USDT</button>
            <button class="btn-usdt" onclick="ejecutarPago(100)">Invertir 100 USDT</button>
            <button class="btn-usdt" onclick="ejecutarPago(1000)">Invertir 1000 USDT</button>
            <button class="btn-usdt" onclick="ejecutarPago(3000)">Invertir 3000 USDT</button>
        </div>
    </div>

    <script>
        // Inicialización básica
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function ejecutarPago(monto) {
            console.log("Presionado botón de: " + monto);
            
            if (!tonConnectUI.connected) {
                alert("Por favor, conecta tu billetera arriba.");
                return;
            }

            // Dirección del contrato Maestro de USDT (Sin espacios)
            const contratoUSDT = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";

            const transaccion = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [
                    {
                        address: contratoUSDT,
                        amount: "50000000", // 0.05 TON para el gas
                        // Instrucción de envío para USDT
                        payload: "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA"
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaccion);
                alert("Solicitud de " + monto + " USDT enviada. Confirma en tu billetera.");
            } catch (error) {
                console.error(error);
                alert("La operación no se pudo completar: " + error.message);
            }
        }
    </script>
</body>
</html>
