<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body style="font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px;">

    <div style="background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155;">
        <h1>🚀 PAY BUNK</h1>
        <p>Inversión en USDT (Red TON)</p>
        
        <div id="ton-connect-button" style="display: flex; justify-content: center; margin: 25px 0; min-height: 44px;"></div>
        
        <button class="btn" onclick="comprobarYInvertir(10)">Invertir 10 USDT</button>
        <button class="btn" onclick="comprobarYInvertir(50)">Invertir 50 USDT</button>
        <button class="btn" onclick="comprobarYInvertir(100)">Invertir 100 USDT</button>
        <button class="btn" onclick="comprobarYInvertir(1000)">Invertir 1000 USDT</button>
        <button class="btn" onclick="comprobarYInvertir(3000)">Invertir 3000 USDT</button>
    </div>

    <style>
        .btn { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn:hover { background-color: #00aaff; }
    </style>

    <script>
        // Inicialización con control de errores
        let tonConnectUI;
        try {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-button'
            });
        } catch (e) {
            console.error("Error al iniciar TonConnect:", e);
        }

        async function comprobarYInvertir(monto) {
            // Si el botón no aparece o no está conectado, forzamos la apertura del selector de billetera
            if (!tonConnectUI.connected) {
                alert("Primero debes conectar tu billetera. Se abrirá el selector ahora...");
                await tonConnectUI.openModal();
                return;
            }

            const contratoUSDT = "EQCxE6mAmikVmG_m_K_S8U6X3HC6_A9A6p79p6B_m4S6A6";
            const payload = "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA";

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: contratoUSDT,
                    amount: "100000000",
                    payload: payload
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("¡Transacción enviada! Confirma en Tonkeeper.");
            } catch (e) {
                console.error(e);
                // Plan de rescate: Link directo si el SDK falla
                window.location.href = ton://transfer/${contratoUSDT}?amount=100000000&bin=${payload};
            }
        }
    </script>
</body>
</html>
